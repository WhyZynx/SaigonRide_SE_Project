<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style_login.css">
</head>
<body class="font-sans">
  <div class="flex min-h-screen">
    <!-- Left Side - Hero Image -->
<div class="hero-bg hidden lg:flex w-1/2 text-white flex-col justify-between p-8 relative">
  
  <!-- Logo ở góc trên bên trái -->
  <div class="z-10">
    <img src="image/logo.jpg" alt="SaigonRide" class="logo">
  </div>

  <!-- Text Box - Overlay kiểu ảnh 2 -->
  <div class="bg-white/10 backdrop-blur-md rounded-3xl p-7 max-w-md z-10">
    <h4 class="text-3xl font-semibold mb-3 leading-tight">Experience the Urban Oasis.</h4>
    <p class="text-gray-100 text-[17px] leading-relaxed">
      Navigate the heart of Saigon with our fleet of premium friendly electric bikes, Zero emissions, maximum freedom, and the pulse of the city at your fingertips.
    </p>
  </div>

  <!-- Bottom Stats -->
  <div class="flex items-center gap-4 text-sm z-10">
    <div class="flex -space-x-3">
      <div class="w-8 h-8 rounded-full bg-white/30 border-2 border-white flex items-center justify-center text-xs">🚲</div>
      <div class="w-8 h-8 rounded-full bg-white/30 border-2 border-white flex items-center justify-center text-xs">🛵</div>
    </div>
    <p class="text-sm">Join 10k+ active riders in Saigon</p>
  </div>
</div>

    <!-- Right Side - Login Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center bg-white p-8">
      <div class="w-full max-w-md">
        <div class="mb-10">
          <h2 class="text-4xl font-bold text-gray-900">Welcome back</h2>
          <p class="text-gray-600 mt-2">Please enter your details to sign in</p>
        </div>

        <form class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">EMAIL ADDRESS</label>
            <input type="email" class="input-field">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">PASSWORD</label>
            <div class="relative">
              <input type="password" class="input-field">
              <a href="#" class="forgot-link">FORGOT?</a>
            </div>
          </div>

          <button type="submit" class="btn-login">
            Log in
          </button>

          <div class="relative text-center my-6">
            <span class="bg-white px-4 text-gray-400 text-sm">or</span>
            <div class="absolute top-1/2 left-0 right-0 h-px bg-gray-200"></div>
          </div>

          <button type="button" class="btn-signup">
            Sign Up
          </button>
        </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
